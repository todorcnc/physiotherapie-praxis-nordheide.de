<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weiterleitung...</title>
    <script>
      (function redirectToSpa() {
        var pathname = window.location.pathname;
        var segments = pathname.split("/").filter(Boolean);
        var repoSegment = segments.length > 0 ? segments[0] : "";
        var basePath = repoSegment ? "/" + repoSegment + "/" : "/";
        var appPath = segments.length > 1 ? "/" + segments.slice(1).join("/") : "/";
        var query = window.location.search ? window.location.search.slice(1) : "";
        var target =
          basePath +
          "?p=" +
          encodeURIComponent(appPath) +
          (query ? "&q=" + encodeURIComponent(query) : "") +
          window.location.hash;

        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
